<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F2E8D9">
<title>El Taller — Mi Bono</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:      #F2E8D9;
    --cream-dark: #E6D9C5;
    --ink:        #1C2B2D;
    --ink-light:  #3D4F51;
    --ink-faint:  #7A8C8E;
    --terracota:  #C1674A;
    --terracota-l:#DFA088;
    --white:      #FDFAF6;
    --sage:       #5A7D5A;
    --warning:    #B87333;
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background: var(--cream); }

  body {
    font-family: 'Jost', sans-serif;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* SCREEN SWITCHER */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    transition: opacity 0.3s ease, transform 0.3s ease;
    background: var(--cream);
  }
  .screen.hidden { opacity:0; pointer-events:none; transform: translateY(12px); }

  /* TOPBAR */
  .topbar {
    background: var(--cream);
    padding: 48px 20px 16px;
    border-bottom: 1px solid var(--cream-dark);
    flex-shrink: 0;
  }
  .topbar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--ink);
  }
  .back-btn {
    background: var(--cream-dark);
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
  }

  /* SCROLL */
  .scroll-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px calc(80px + var(--safe-bottom));
  }
  ::-webkit-scrollbar { display: none; }

  /* ESTADO SWITCHER (solo demo) */
  .estado-switcher {
    background: var(--white);
    border: 1px solid var(--cream-dark);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .estado-switcher-label {
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 500;
  }
  .estado-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .estado-btn {
    font-size: 0.68rem;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--cream-dark);
    background: transparent;
    color: var(--ink-faint);
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-weight: 500;
    transition: all 0.15s;
  }
  .estado-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--cream);
  }

  /* ══════════════════════
     ESTADO 1 — BONO ACTIVO
  ══════════════════════ */
  .bono-card-main {
    background: var(--ink);
    border-radius: 12px;
    padding: 24px 22px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .bono-card-main::before {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(242,232,217,0.04);
    top: -80px; right: -60px;
  }
  .bono-card-main::after {
    content: '';
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(193,103,74,0.07);
    bottom: -40px; left: -20px;
  }

  .bono-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    position: relative; z-index: 1;
  }
  .bono-tipo-label {
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(242,232,217,0.45);
    margin-bottom: 6px;
  }
  .bono-nombre-main {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--cream);
  }
  .bono-estado-badge {
    font-size: 0.62rem;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .badge-activo   { background: rgba(90,125,90,0.25); color: #8FC48F; }
  .badge-caducado { background: rgba(180,60,60,0.25); color: #E09090; }
  .badge-sin-bono { background: rgba(184,115,51,0.25); color: #DFA060; }
  .badge-agotado  { background: rgba(180,60,60,0.2); color: #E09090; }

  /* Contador grande */
  .bono-counter {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 16px;
    position: relative; z-index: 1;
  }
  .bono-counter-num {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    color: var(--cream);
    line-height: 1;
  }
  .bono-counter-label {
    font-size: 0.76rem;
    color: rgba(242,232,217,0.5);
    font-weight: 300;
    padding-bottom: 8px;
    line-height: 1.4;
  }
  .bono-counter-label strong { color: var(--terracota-l); }

  /* Dots */
  .bono-dots-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 18px;
    position: relative; z-index: 1;
  }
  .bdot {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .bdot.used { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
  .bdot.used::after { content: '✓'; color: rgba(255,255,255,0.5); font-size: 0.6rem; }
  .bdot.next {
    border-color: var(--terracota-l);
    animation: pulseDot 2s infinite;
  }

  @keyframes pulseDot {
    0%,100% { border-color: var(--terracota-l); }
    50%      { border-color: rgba(223,160,136,0.3); }
  }

  /* Barra progreso */
  .bono-bar-wrap {
    position: relative; z-index: 1;
  }
  .bono-bar-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: rgba(242,232,217,0.4);
    margin-bottom: 6px;
  }
  .bono-bar {
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .bono-bar-fill {
    height: 100%;
    background: var(--terracota-l);
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  /* Info chips */
  .chips-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .chip {
    background: var(--white);
    border: 1px solid var(--cream-dark);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .chip-label {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 5px;
    font-weight: 500;
  }
  .chip-value {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--ink);
  }
  .chip-value.ok      { color: var(--sage); }
  .chip-value.warning { color: var(--warning); }
  .chip-value.danger  { color: #A04040; }

  /* Historial uso bono */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .uso-list {
    background: var(--white);
    border: 1px solid var(--cream-dark);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .uso-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--cream-dark);
  }
  .uso-row:last-child { border-bottom: none; }
  .uso-dot { width:7px; height:7px; border-radius:50%; background:var(--ink-faint); flex-shrink:0; }
  .uso-info { flex: 1; }
  .uso-nombre { font-size: 0.86rem; color: var(--ink); font-weight: 500; }
  .uso-fecha  { font-size: 0.72rem; color: var(--ink-faint); font-weight: 300; margin-top: 2px; }
  .uso-check  { font-size: 0.85rem; color: var(--sage); }

  /* ══════════════════════
     ESTADO 2 — SIN BONO / NO CARGADO
  ══════════════════════ */
  .sin-bono-card {
    background: var(--white);
    border: 1.5px solid var(--cream-dark);
    border-radius: 12px;
    padding: 28px 22px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .sin-bono-card.warning-card {
    border-color: rgba(184,115,51,0.4);
    background: #FDFAF3;
  }
  .sin-bono-card.danger-card {
    border-color: rgba(180,60,60,0.3);
    background: #FDF8F8;
  }
  .sin-bono-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
  }
  .sin-bono-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .sin-bono-title em { font-style: italic; color: var(--terracota); }
  .sin-bono-text {
    font-size: 0.84rem;
    color: var(--ink-faint);
    line-height: 1.75;
    font-weight: 300;
    margin-bottom: 24px;
    max-width: 280px;
    margin-left: auto; margin-right: auto;
  }
  .sin-bono-text strong { color: var(--ink); font-weight: 600; }

  .btn-contactar-covi {
    width: 100%;
    background: var(--ink);
    color: var(--cream);
    border: none;
    padding: 15px;
    border-radius: 4px;
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-whatsapp {
    width: 100%;
    background: #25D366;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 4px;
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  /* Aviso bloqueo reserva */
  .bloqueo-aviso {
    background: rgba(180,60,60,0.08);
    border: 1px solid rgba(180,60,60,0.2);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
  }
  .bloqueo-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .bloqueo-text {
    font-size: 0.8rem;
    color: #A04040;
    line-height: 1.6;
    font-weight: 400;
  }
  .bloqueo-text strong { font-weight: 600; }

  /* Info últimas clases */
  .ultimo-bono-info {
    background: var(--white);
    border: 1px solid var(--cream-dark);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .ultimo-bono-header {
    padding: 12px 16px;
    background: var(--cream);
    border-bottom: 1px solid var(--cream-dark);
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 500;
  }
  .ultimo-bono-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--cream-dark);
  }
  .ultimo-bono-row:last-child { border-bottom: none; }
  .ultimo-bono-label { font-size: 0.78rem; color: var(--ink-faint); }
  .ultimo-bono-value { font-size: 0.84rem; color: var(--ink); font-weight: 500; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--cream-dark);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .nav-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px 8px;
    cursor: pointer;
    gap: 3px;
  }
  .nav-tab-icon  { font-size: 1.2rem; }
  .nav-tab-label {
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink-faint);
  }
  .nav-tab.active .nav-tab-label { color: var(--ink); }
  .nav-tab-dot { width:4px; height:4px; border-radius:50%; background:var(--terracota); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .anim { animation: fadeUp 0.4s ease both; }
</style>
</head>
<body>

<!-- ══════════════
     PANTALLA BONO
══════════════ -->
<div class="screen" id="bonoPantalla">

  <div class="topbar">
    <div class="topbar-row">
      <button class="back-btn">←</button>
      <div class="topbar-title">Mi bono</div>
      <div style="width:36px"></div>
    </div>
  </div>

  <div class="scroll-body">

    <!-- DEMO SWITCHER -->
    <div class="estado-switcher">
      <div class="estado-switcher-label">👁 Vista previa — Estado del bono</div>
      <div class="estado-btns">
        <button class="estado-btn active" onclick="setEstado('activo')">✅ Activo</button>
        <button class="estado-btn" onclick="setEstado('agotado')">🔴 Agotado</button>
        <button class="estado-btn" onclick="setEstado('no-cargado')">⚠️ Sin cargar</button>
        <button class="estado-btn" onclick="setEstado('caducado')">❌ Caducado</button>
      </div>
    </div>

    <!-- CONTENIDO DINÁMICO -->
    <div id="bonoContent"></div>

  </div>

  <div class="bottom-nav">
    <div class="nav-tab"><div class="nav-tab-icon">🏠</div><div class="nav-tab-label">Inicio</div></div>
    <div class="nav-tab"><div class="nav-tab-icon">📅</div><div class="nav-tab-label">Reservas</div></div>
    <div class="nav-tab active"><div class="nav-tab-icon">🎟</div><div class="nav-tab-label">Mi bono</div><div class="nav-tab-dot"></div></div>
    <div class="nav-tab"><div class="nav-tab-icon">📋</div><div class="nav-tab-label">Historial</div></div>
    <div class="nav-tab"><div class="nav-tab-icon">👤</div><div class="nav-tab-label">Perfil</div></div>
  </div>
</div>

<script>
  const TEMPLATES = {

    activo: () => `

      <div class="ultimo-bono-info anim">
